spring.application.name=atv2
# ===============================
# CONFIGURAÇÕES DO BANCO DE DADOS (DATA SOURCE)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/onetomany?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=seu_usuario_aqui
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ===============================
# Mostra o SQL gerado no console (ótimo para debug)
spring.jpa.show-sql=true
# Substitua 'root' pelo seu usuário real do MySQL
spring.datasource.username=root

# Substitua 'sua_senha_real' pela senha que você usa para entrar no MySQL
spring.datasource.password=mysqlPW
# Formata o SQL no console para ficar mais legível
spring.jpa.properties.hibernate.format_sql=true

# Estratégia de geração das tabelas
spring.jpa.hibernate.ddl-auto=update

# Dialeto específico para otimizar as queries no MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
server.port =8081